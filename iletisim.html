</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand" href="index.html">Web Projem</a>

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="hakkinda.html">Hakkımda</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="cv.html">CV</a>
                </li>

                <li class="nav-item">

                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="iletisim.html">İletişim</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="takimimiz.html">Takımımız</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="ilgi.html">İlgi Alanlarım</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="login.html">Login</a>
                </li>

            </ul>

        </div>
    </nav>

    <div class="container mt-5" mb-5>

        <div class="row justify-content-center">

            <div class="col-md-6">

                <h2 class="text-center mb-4">İletişim Formu</h2>

                <form id="iletisimForm">

                    <div class="mb-3">
                        <label>Ad</label>
                        <input type="text" id="ad" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Soyad</label>
                        <input type="text" id="soyad" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Üniversite</label>
                        <input type="text" id="universite" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Sınıf</label>
                        <select id="sinif" class="form-control">
                            <option value="" selected disabled>Seçiniz</option>
                            <option value="1">1. Sınıf</option>
                            <option value="2">2. Sınıf</option>
                            <option value="3">3. Sınıf</option>
                            <option value="4">4. Sınıf</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Şehir</label>
                        <input type="text" id="sehir" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>E-posta</label>
                        <input type="email" id="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Cinsiyet</label><br>

                        <input type="radio" name="cinsiyet" value="Erkek"> Erkek
                        <input type="radio" name="cinsiyet" value="Kadın" class="ms-3"> Kadın
                    </div>

                    <div class="mb-3">
                        <label>Konu</label>
                        <select id="konu" class="form-control">
                            <option value="">Seçiniz</option>
                            <option value="bilgi">Bilgi Alma</option>
                            <option value="oneri">Öneri</option>
                            <option value="sikayet">Şikayet</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Mesaj</label>
                        <textarea id="mesaj" class="form-control" rows="4"></textarea>
                    </div>

                    <button type="button" class="btn btn-dark w-100" onclick="kontrolEt()">
                        Gönder
                    </button>

                </form>

                <div id="sonuc" class="mt-4"></div>

            </div>

        </div>

    </div>

    <script src="js/iletisim.js"></script>

</body>

</html>
