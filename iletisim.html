    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/iletisim.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand"">Web Projem</a>

            <ul class=" navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Hakkımda</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="cv.html">CV</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="sehrim.html">Şehrim</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="iletisim.html">İletişim</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="takimimiz.html">Takımımız</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="ilgi.html">İlgi Alanlarım</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="login.html">Login</a>
                </li>

                </ul>

        </div>
    </nav>

    <div class="container mt-5" mb-5>

        <div class="row justify-content-center">

            <div class="col-md-6">

                <h2 class="text-center mb-4">İletişim Formu</h2>

                <div id="app">
                    <form id="iletisimForm">

                        <div class="mb-3">
                            <label>Ad</label>
                            <input type="text" id="ad" v-model="ad" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Soyad</label>
                            <input type="text" id="soyad" v-model="soyad" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Üniversite</label>
                            <input type="text" id="universite" v-model="universite" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Sınıf</label>
                            <select id="sinif" v-model="sinif" class="form-control">
                                <option value="" selected disabled>Seçiniz</option>
                                <option value="1">1. Sınıf</option>
                                <option value="2">2. Sınıf</option>
                                <option value="3">3. Sınıf</option>
                                <option value="4">4. Sınıf</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label>Şehir</label>
                            <input type="text" id="sehir" v-model="sehir" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>E-posta</label>
                            <input type="email" id="email" v-model="email" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label>Cinsiyet</label><br>

                            <input type="radio" name="cinsiyet" v-model="cinsiyet" value="Erkek"> Erkek
                            <input type="radio" name="cinsiyet" v-model="cinsiyet" value="Kadın" class="ms-3"> Kadın
                        </div>

                        <!-- Form içindeki ilgili kısımları bu şekilde güncelleyin -->
                        <div class="mb-3">
                            <label>Konu</label>
                            <select id="konu" v-model="konu" class="form-control"> <!-- v-model eklendi -->
                                <option value="">Seçiniz</option>
                                <option value="bilgi">Bilgi Alma</option>
                                <option value="oneri">Öneri</option>
                                <option value="sikayet">Şikayet</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label>Mesaj</label>
                            <textarea id="mesaj" v-model="mesaj" class="form-control" rows="4"></textarea>
                            <!-- v-model eklendi -->
                        </div>

                        <div class="d-grid gap-2">
                            <button type="button" class="btn btn-dark" onclick="kontrolEt()">
                                JavaScript ile Kontrol
                            </button>

                            <button type="button" class="btn btn-success" @click="kontrolEt">
                                Vue.js ile Kontrol
                            </button>
                        </div>

                        <!-- Vue Sonuç Mesajı Alanı -->
                        <div class="mt-3">
                            <div v-if="hatalar.length > 0" class="alert alert-danger">
                                <ul class="mb-0">
                                    <li v-for="hata in hatalar">{{ hata }}</li>
                                </ul>
                            </div>

                            <div v-else-if="sonuc" class="alert alert-success" v-html="sonuc">
                            </div>
                        </div>

                    </form>
                </div>

                <div id="sonuc" class="mt-4">
                </div>

            </div>

        </div>

    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/iletisim.js"></script>

</body>

</html>
