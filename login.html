<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Web Sitesi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #ffffff;
        }

        .login-image {
            mix-blend-mode: multiply;
            max-width: 90%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .btn-rainbow-border {
            position: relative;
            background: #212529;
            color: white !important;
            border: none;
            padding: 12px;
            border-radius: 8px;
            z-index: 1;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .btn-rainbow-border:hover::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: -2;
            background: conic-gradient(#ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            animation: rotate-rainbow 3s linear infinite;
        }

        .btn-rainbow-border::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: #212529;
            border-radius: 6px;
            z-index: -1;
        }

        .btn-rainbow-border:hover {
            transform: scale(1.02);
            color: white !important;
        }

        @keyframes rotate-rainbow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .login-image {
                max-width: 60%;
                margin-top: 30px;
            }
        }
    </style>
</head>

            </ul>

        </div>
    </nav>

    <div class="container" style="margin-top: 80px; margin-bottom: 50px;">

        <div class="row align-items-center">

            <div class="col-md-5">

                <div class="card p-4 shadow-sm border-0">

                    <h2 class="text-center mb-4 fw-bold">Öğrenci Girişi</h2>

                    <form action="login.php" method="POST">

                        <div class="mb-3">
                            <label class="form-label">Şifre</label>
                            <input type="password" name="password" class="form-control" placeholder="Öğrenci numaranız"
                                required>
                        </div>

                        <button type="submit" class="btn w-100 btn-rainbow-border">
                            Giriş Yap
                        </button>

                    </form>
